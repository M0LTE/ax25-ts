name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: build + typecheck + test
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm ci
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: typecheck examples
        run: npm run typecheck:examples

      - name: build
        run: npm run build

      - name: unit tests
        # `npm test` excludes tests/integration/** (those run in
        # m0lte/packet.net's interop job, where the docker stack lives).
        run: npm test
